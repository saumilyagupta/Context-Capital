openapi: 3.1.0
info:
  title: Context Capital — Local API
  version: "0.1.0"
  summary: Loopback HTTP API for the Phase-1 reference client.
  description: |
    The Phase-1 server binds only to `127.0.0.1`. It exposes a REST surface
    used by the CLI and the browser extension's native-messaging host. The
    MCP tool/resource surface is documented separately in `README.md` §4.
  license:
    name: Apache-2.0
servers:
  - url: http://127.0.0.1:{port}/v1
    description: Local loopback. Default port 7843.
    variables:
      port:
        default: "7843"

tags:
  - name: capture
    description: Ingestion of vendor export files.
  - name: extraction
    description: Memory extraction jobs.
  - name: memories
    description: CRUD over the memory store.
  - name: context
    description: Context Protocol v0.1 export / import.
  - name: scope
    description: Per-AI permission grants.
  - name: audit
    description: Audit log access.
  - name: control
    description: Lock / unlock / verify.

paths:
  /captures:
    post:
      tags: [capture]
      summary: Ingest a vendor export.
      operationId: createCapture
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [vendor, file]
              properties:
                vendor:
                  type: string
                  enum: [chatgpt, claude]
                file:
                  type: string
                  format: binary
                subject_id:
                  type: string
                  description: Defaults to the active subject if omitted.
      responses:
        '201':
          description: Capture created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Capture' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Duplicate (same vendor + file hash already captured).
        '423': { $ref: '#/components/responses/Locked' }

  /captures/{capture_id}:
    parameters:
      - { $ref: '#/components/parameters/CaptureId' }
    get:
      tags: [capture]
      summary: Get capture metadata.
      operationId: getCapture
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Capture' }
        '404': { $ref: '#/components/responses/NotFound' }

  /captures/{capture_id}/extract:
    parameters:
      - { $ref: '#/components/parameters/CaptureId' }
    post:
      tags: [extraction]
      summary: Start (or resume) extraction for a capture.
      operationId: startExtraction
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  example: anthropic/claude-sonnet-4-7
                resume:
                  type: boolean
                  default: true
      responses:
        '202':
          description: Job enqueued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExtractionJob' }
        '423': { $ref: '#/components/responses/Locked' }

  /extractions/{job_id}:
    parameters:
      - { $ref: '#/components/parameters/JobId' }
    get:
      tags: [extraction]
      summary: Get extraction-job status.
      operationId: getExtractionJob
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExtractionJob' }
        '404': { $ref: '#/components/responses/NotFound' }

  /memories:
    get:
      tags: [memories]
      summary: List memories with filters.
      operationId: listMemories
      parameters:
        - in: query
          name: subject_id
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
        - in: query
          name: predicate
          schema: { type: string }
        - in: query
          name: sensitivity
          schema:
            type: array
            items: { type: string, enum: [public, work, personal, secret] }
        - in: query
          name: q
          description: Free-text search over decrypted content (server-side, in-memory).
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryPage' }
        '423': { $ref: '#/components/responses/Locked' }

  /memories/{memory_id}:
    parameters:
      - { $ref: '#/components/parameters/MemoryId' }
    get:
      tags: [memories]
      summary: Fetch a single memory.
      operationId: getMemory
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Memory' }
        '404': { $ref: '#/components/responses/NotFound' }
        '423': { $ref: '#/components/responses/Locked' }
    delete:
      tags: [memories]
      summary: Delete a memory.
      operationId: deleteMemory
      responses:
        '204': { description: deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '423': { $ref: '#/components/responses/Locked' }

  /context/export:
    post:
      tags: [context]
      summary: Export a signed context.json (Context Protocol v0.1).
      operationId: exportContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id]
              properties:
                subject_id: { type: string }
                kinds:
                  type: array
                  items: { type: string, enum: [preference, fact, decision, project, workflow, skill] }
                sensitivities:
                  type: array
                  items: { type: string, enum: [public, work, personal] }
                  description: |
                    `secret` is excluded by default. To include, set `include_secret: true`.
                include_secret:
                  type: boolean
                  default: false
                strip_raw_excerpt:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Signed context document.
          content:
            application/json:
              schema:
                description: A Context Protocol v0.1 document.
                type: object
        '423': { $ref: '#/components/responses/Locked' }

  /context/import:
    post:
      tags: [context]
      summary: Import a signed context.json.
      operationId: importContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: A Context Protocol v0.1 document.
              type: object
      responses:
        '200':
          description: Import summary.
          content:
            application/json:
              schema:
                type: object
                required: [imported, duplicates, sanitized, rejected]
                properties:
                  imported:   { type: integer }
                  duplicates: { type: integer }
                  sanitized:  { type: integer }
                  rejected:   { type: integer }
                  conflicts:
                    type: array
                    items: { $ref: '#/components/schemas/MemoryConflict' }
        '400':
          description: Schema invalid.
        '401':
          description: Signature verification failed.
        '423': { $ref: '#/components/responses/Locked' }

  /scopes:
    get:
      tags: [scope]
      summary: List active scope grants.
      operationId: listScopes
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ScopeGrant' }
    post:
      tags: [scope]
      summary: Create a new scope grant.
      operationId: createScope
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScopeGrantInput' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScopeGrant' }
        '423': { $ref: '#/components/responses/Locked' }

  /scopes/{scope_id}:
    parameters:
      - in: path
        name: scope_id
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [scope]
      summary: Revoke a scope grant.
      operationId: revokeScope
      responses:
        '204': { description: revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /audit:
    get:
      tags: [audit]
      summary: Paginated audit-log read.
      operationId: listAuditEntries
      parameters:
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: actor
          schema: { type: string }
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEntry' }
                  next_cursor: { type: string, nullable: true }

  /audit/verify:
    post:
      tags: [audit]
      summary: Verify the audit hash chain.
      operationId: verifyAudit
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [ok, checked, first_break]
                properties:
                  ok: { type: boolean }
                  checked: { type: integer }
                  first_break: { type: integer, nullable: true }

  /control/lock:
    post:
      tags: [control]
      summary: Zero the in-memory key.
      operationId: lockStore
      responses:
        '204': { description: locked }

  /control/unlock:
    post:
      tags: [control]
      summary: Load the in-memory key from passphrase or keystore.
      operationId: unlockStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [passphrase]
                  properties:
                    passphrase: { type: string }
                - type: object
                  required: [use_keystore]
                  properties:
                    use_keystore: { type: boolean, enum: [true] }
      responses:
        '204': { description: unlocked }
        '401':
          description: Wrong passphrase or unavailable keystore.
        '429':
          description: Locked out due to repeated failures.

  /control/status:
    get:
      tags: [control]
      summary: Liveness + readiness.
      operationId: getStatus
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [version, locked, schema_version]
                properties:
                  version: { type: string }
                  locked:  { type: boolean }
                  schema_version: { type: string }
                  active_subject: { type: string, nullable: true }

components:

  parameters:
    CaptureId:
      in: path
      name: capture_id
      required: true
      schema: { type: string, format: uuid }
    JobId:
      in: path
      name: job_id
      required: true
      schema: { type: string, format: uuid }
    MemoryId:
      in: path
      name: memory_id
      required: true
      schema: { type: string, pattern: '^mem_[a-f0-9]{32}$' }

  schemas:

    Capture:
      type: object
      required: [id, subject_id, source_vendor, captured_at, message_count]
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string }
        source_vendor: { type: string, enum: [chatgpt, claude, manual, import] }
        captured_at: { type: string, format: date-time }
        message_count: { type: integer }

    ExtractionJob:
      type: object
      required: [id, capture_id, status, next_chunk, model]
      properties:
        id: { type: string, format: uuid }
        capture_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, paused, done, failed] }
        next_chunk: { type: integer }
        total_chunks: { type: integer, nullable: true }
        model: { type: string }
        updated_at: { type: string, format: date-time }

    Memory:
      type: object
      required: [id, subject_id, kind, predicate, object, confidence, sensitivity, provenance]
      properties:
        id: { type: string, pattern: '^mem_[a-f0-9]{32}$' }
        subject_id: { type: string }
        kind: { type: string, enum: [preference, fact, decision, project, workflow, skill] }
        predicate: { type: string, maxLength: 64 }
        object:
          type: object
          required: [value]
          properties:
            value: {}
            type: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        sensitivity: { type: string, enum: [public, work, personal, secret] }
        provenance: { $ref: '#/components/schemas/Provenance' }
        validity:   { $ref: '#/components/schemas/Validity' }

    MemoryPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Memory' }
        next_cursor:
          type: string
          nullable: true

    MemoryConflict:
      type: object
      required: [predicate, existing_memory_id, incoming_memory_id]
      properties:
        predicate: { type: string }
        existing_memory_id: { type: string }
        incoming_memory_id: { type: string }
        note: { type: string }

    Provenance:
      type: object
      required: [source, extracted_at]
      properties:
        source: { type: string }
        extracted_at: { type: string, format: date-time }
        raw_excerpt: { type: string, maxLength: 4096 }
        imported: { type: boolean }
        import_source: { type: string }
        model: { type: string }
        sanitization_trace:
          type: array
          items: { type: string }

    Validity:
      type: object
      properties:
        valid_from:    { type: string, format: date-time }
        valid_until:   { type: string, format: date-time, nullable: true }
        superseded_by: { type: string, nullable: true }

    ScopeGrantInput:
      type: object
      required: [scope_name, client_id, allowed_sensitivities]
      properties:
        scope_name: { type: string }
        client_id:  { type: string }
        allowed_sensitivities:
          type: array
          items: { type: string, enum: [public, work, personal, secret] }
        allowed_kinds:
          type: array
          items: { type: string, enum: [preference, fact, decision, project, workflow, skill] }
        allowed_predicates:
          type: array
          items: { type: string }
        expires_at: { type: string, format: date-time, nullable: true }
        allow_secret: { type: boolean, default: false }

    ScopeGrant:
      allOf:
        - $ref: '#/components/schemas/ScopeGrantInput'
        - type: object
          required: [id, created_at]
          properties:
            id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            revoked_at: { type: string, format: date-time, nullable: true }

    AuditEntry:
      type: object
      required: [id, at, actor, action, outcome]
      properties:
        id: { type: integer }
        at: { type: string, format: date-time }
        actor: { type: string }
        action: { type: string }
        subject_id: { type: string, nullable: true }
        details: { type: object }
        outcome: { type: string, enum: [success, denied, error] }

    Error:
      type: object
      required: [type, title, status]
      properties:
        type:   { type: string, format: uri, default: about:blank }
        title:  { type: string }
        status: { type: integer }
        detail: { type: string }
        code:   { type: string }
        instance: { type: string, format: uri }

  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Error' }
    Locked:
      description: Store is locked.
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  code: { type: string, const: LOCKED }

  securitySchemes:
    LocalLoopback:
      type: apiKey
      in: header
      name: X-CC-Token
      description: |
        Phase 1 uses a per-install token (random 32-byte string) generated at
        install and stored in the OS keystore. The token is required for every
        non-`/control/status` request. Native-messaging clients receive the
        token at registration time.

security:
  - LocalLoopback: []
